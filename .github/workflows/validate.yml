name: Validate Release Metadata

on:
  pull_request:
    paths:
      - 'latest.json'
      - 'changelog/**'
  push:
    branches:
      - main
    paths:
      - 'latest.json'

jobs:
  validate:
    name: Validate latest.json
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Validate JSON syntax
        run: |
          jq empty latest.json || {
            echo "❌ Invalid JSON in latest.json"
            exit 1
          }
          
      - name: Check version format
        run: |
          VERSION=$(jq -r '.version' latest.json)
          if [[ ! $VERSION =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "❌ Invalid version format: $VERSION"
            exit 1
          fi
          echo "✅ Version format valid: $VERSION"
          
      - name: Verify required fields
        run: |
          jq -e '.version' latest.json > /dev/null || exit 1
          jq -e '.pub_date' latest.json > /dev/null || exit 1
          jq -e '.platforms."darwin-aarch64".url' latest.json > /dev/null || exit 1
          jq -e '.platforms."darwin-aarch64".signature' latest.json > /dev/null || exit 1
          jq -e '.platforms."darwin-x86_64".url' latest.json > /dev/null || exit 1
          jq -e '.platforms."darwin-x86_64".signature' latest.json > /dev/null || exit 1
          jq -e '.platforms."windows-x86_64".url' latest.json > /dev/null || exit 1
          jq -e '.platforms."windows-x86_64".signature' latest.json > /dev/null || exit 1
          echo "✅ All required fields present"
          
      - name: Verify GitHub release URLs
        run: |
          VERSION=$(jq -r '.version' latest.json)
          EXPECTED_BASE="https://github.com/gredevelopment/arca-updates/releases/download/v${VERSION}"
          
          for platform in darwin-aarch64 darwin-x86_64 windows-x86_64; do
            URL=$(jq -r ".platforms.\"${platform}\".url" latest.json)
            if [[ ! $URL == ${EXPECTED_BASE}/* ]]; then
              echo "❌ Invalid URL for ${platform}: ${URL}"
              exit 1
            fi
          done
          echo "✅ All URLs point to correct release"
          
      - name: Check signatures format
        run: |
          for platform in darwin-aarch64 darwin-x86_64 windows-x86_64; do
            SIG=$(jq -r ".platforms.\"${platform}\".signature" latest.json)
            if [[ ! $SIG =~ ^dW50cnVzdGVkIGNvbW1lbnQ6 ]]; then
              echo "❌ Invalid signature format for ${platform}"
              exit 1
            fi
          done
          echo "✅ All signatures have valid Tauri format"
